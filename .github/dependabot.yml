# Dependabot keeps the npm + GitHub Actions dependency graphs current
# so security advisories get picked up automatically. Grouped so PR
# noise stays manageable: one PR per ecosystem per week, with patch
# and minor bumps grouped together.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
      types:
        patterns:
          - "@types/*"
    ignore:
      # Avoid noisy major bumps on framework-level packages — review
      # those manually.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
